name: Franquette in a JAR
on:
  push:
    branches:
      - release

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: franquette-bdd-test
        ports:
          - 3306:3306
        options: >-
          --name mysql
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: List running containers
        run: docker ps
      - name: Wait for MySQL to be ready
        run: |
          for i in {30..0}; do
          if docker exec mysql mysql -uroot -ptest -e "SELECT 1" &> /dev/null; then
           break
          fi
          echo 'MySQL is unavailable - sleeping'
          sleep 1
          done
          if [ "$i" = 0 ]; then
          echo 'MySQL did not become available in time' >&2
          docker logs mysql
          exit 1
          fi
      - name: Execute init.sql
        run: docker exec -i mysql mysql -uroot -ptest < init.sql
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Cache maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml')}}
          restore-keys: ${{ runner.os }}-m2
      - name: Build with Maven
        run: mvn -B package --file pom.xml

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
      - run: ls
      - run: mkdir staging
      - run: mkdir staging/target
      - run: cp target/*.jar staging/target
      - run: cp docker-compose.yml staging
      - run: cp Dockerfile staging
      - run: cp runner_la_Franquette.sh staging
      - uses: actions/upload-artifact@v4
        with:
          name: Package
          path: staging